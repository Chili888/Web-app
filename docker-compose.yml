services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - support-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    profiles: ["tools"]
    build: .
    env_file:
      - path: .env
        required: false
    command: ["node", "dist/apps/bot-backend/src/cli/migrate.js"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file:
      - path: .env
        required: false
    command: ["node", "dist/apps/bot-backend/src/server.js"]
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: .
    env_file:
      - path: .env
        required: false
    command: ["node", "dist/apps/bot-backend/src/worker.js"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "dist/apps/bot-backend/src/cli/worker-health.js"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  support-db-data:
