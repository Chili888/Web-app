services:
  integration-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telegram_integration
      POSTGRES_USER: telegram_integration
      POSTGRES_PASSWORD: integration-only-password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telegram_integration -d telegram_integration"]
      interval: 2s
      timeout: 3s
      retries: 20

  integration-migrate:
    build:
      context: .
      target: runtime
    environment:
      DATABASE_URL: postgresql://telegram_integration:integration-only-password@integration-db:5432/telegram_integration
      DATABASE_SSL_MODE: disable
    command: ["node", "dist/apps/bot-backend/src/cli/migrate.js"]
    depends_on:
      integration-db:
        condition: service_healthy

  integration-test:
    build:
      context: .
      target: build
    environment:
      TEST_DATABASE_URL: postgresql://telegram_integration:integration-only-password@integration-db:5432/telegram_integration
      DATABASE_SSL_MODE: disable
    command: ["npm", "run", "test:integration"]
    depends_on:
      integration-migrate:
        condition: service_completed_successfully
