<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <title>ice_store</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b1220);
      --surface: var(--tg-theme-secondary-bg-color, #131c2f);
      --text: var(--tg-theme-text-color, #f8fafc);
      --muted: var(--tg-theme-hint-color, #94a3b8);
      --accent: var(--tg-theme-button-color, #3b82f6);
      --accent-text: var(--tg-theme-button-text-color, #ffffff);
      --line: rgba(148, 163, 184, .18);
      --soft: rgba(255, 255, 255, .06);
      --shadow: 0 18px 45px rgba(0, 0, 0, .20);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 90% -10%, rgba(59,130,246,.24), transparent 30%),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      padding-bottom: calc(100px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 15px 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand { display: flex; align-items: center; gap: 11px; }
    .logo {
      width: 46px;
      height: 46px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      font-size: 23px;
      background: linear-gradient(135deg, #60a5fa, #2563eb);
      box-shadow: 0 10px 24px rgba(37,99,235,.28);
    }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }

    .round-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--soft);
      font-size: 19px;
    }

    .hero {
      padding: 22px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(37,99,235,.97), rgba(79,70,229,.92));
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .hero::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      right: -78px;
      top: -92px;
      background: rgba(255,255,255,.14);
    }
    .hero small {
      display: inline-flex;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      color: #fff;
    }
    .hero h2 { margin: 15px 0 8px; font-size: 27px; color: #fff; }
    .hero p { margin: 0; line-height: 1.6; color: rgba(255,255,255,.82); font-size: 14px; }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      margin: 24px 2px 12px;
    }
    .section-title h3 { margin: 0; font-size: 18px; }
    .section-title span { color: var(--muted); font-size: 12px; }

    .search {
      height: 50px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
    }
    .search input {
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
    }
    .search input::placeholder { color: var(--muted); }

    .tabs {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 12px 1px 4px;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 9px 14px;
      color: var(--muted);
      background: var(--soft);
    }
    .tab.active {
      border-color: transparent;
      color: var(--accent-text);
      background: var(--accent);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .product {
      min-width: 0;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }
    .product-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      font-size: 25px;
      background: var(--soft);
    }
    .badge {
      display: inline-block;
      margin-top: 11px;
      padding: 5px 8px;
      border-radius: 999px;
      color: #93c5fd;
      background: rgba(59,130,246,.13);
      font-size: 10px;
    }
    .product h4 {
      margin: 10px 0 7px;
      font-size: 15px;
      line-height: 1.35;
    }
    .product p {
      margin: 0;
      min-height: 38px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 13px;
    }
    .price { font-weight: 800; font-size: 15px; }
    .view-btn {
      border: 0;
      border-radius: 11px;
      padding: 8px 11px;
      color: var(--accent-text);
      background: var(--accent);
      font-size: 12px;
    }

    .empty {
      grid-column: 1 / -1;
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 18px;
    }

    .selected-bar {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: calc(12px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(728px, calc(100% - 24px));
      display: none;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 13px 12px 16px;
      border: 1px solid var(--line);
      border-radius: 19px;
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }
    .selected-bar.show { display: flex; }
    .selected-bar b { display: block; font-size: 14px; }
    .selected-bar span { color: var(--muted); font-size: 11px; }
    .selected-bar button {
      border: 0;
      border-radius: 13px;
      padding: 11px 14px;
      color: var(--accent-text);
      background: var(--accent);
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      z-index: 60;
      inset: 0;
      display: none;
      align-items: flex-end;
      background: rgba(0,0,0,.55);
    }
    .overlay.show { display: flex; }
    .sheet {
      width: min(760px, 100%);
      max-height: 88vh;
      margin: 0 auto;
      overflow-y: auto;
      padding: 12px 17px calc(20px + env(safe-area-inset-bottom));
      border-radius: 26px 26px 0 0;
      background: var(--bg);
      box-shadow: var(--shadow);
    }
    .handle {
      width: 42px;
      height: 5px;
      border-radius: 999px;
      margin: 1px auto 14px;
      background: var(--line);
    }
    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sheet-head h3 { margin: 0; }
    .close-btn {
      border: 0;
      color: var(--muted);
      background: transparent;
      font-size: 26px;
    }
    .detail-icon {
      width: 72px;
      height: 72px;
      display: grid;
      place-items: center;
      margin-top: 15px;
      border-radius: 22px;
      font-size: 38px;
      background: var(--soft);
    }
    .detail h2 { margin: 15px 0 7px; font-size: 22px; }
    .detail-price { font-size: 20px; font-weight: 850; }
    .detail-desc {
      margin: 15px 0;
      color: var(--muted);
      line-height: 1.75;
      font-size: 14px;
      white-space: pre-line;
    }
    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .action-btn {
      min-height: 50px;
      border-radius: 15px;
      border: 1px solid var(--line);
      color: var(--text);
      background: var(--soft);
      font-weight: 700;
    }
    .action-btn.primary {
      border: 0;
      color: var(--accent-text);
      background: var(--accent);
    }
    .action-btn.full { grid-column: 1 / -1; }

    .pick-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
    }
    .pick-row h4 { margin: 0 0 5px; font-size: 14px; }
    .pick-row p { margin: 0; color: var(--muted); font-size: 12px; }
    .remove-btn {
      border: 0;
      color: #fca5a5;
      background: transparent;
    }
    .consult-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%;
      top: calc(18px + env(safe-area-inset-top));
      transform: translate(-50%, -18px);
      opacity: 0;
      pointer-events: none;
      padding: 11px 15px;
      border-radius: 13px;
      color: #fff;
      background: rgba(15,23,42,.95);
      transition: .2s ease;
      box-shadow: var(--shadow);
      font-size: 13px;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 390px) {
      .products { grid-template-columns: 1fr; }
      .product p { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" id="storeLogo">❄️</div>
        <div>
          <h1 id="storeName">ice_store</h1>
          <p id="hello">正在连接 Telegram…</p>
        </div>
      </div>
      <button class="round-btn" id="topConsultBtn" aria-label="咨询客服">💬</button>
    </header>

    <section class="hero">
      <small id="heroTag">全部商品均可咨询</small>
      <h2 id="heroTitle">先浏览，再选择</h2>
      <p id="heroText">查看全部商品与服务，选中感兴趣的内容后，一键分享或联系客服咨询。</p>
    </section>

    <div class="section-title">
      <h3>全部商品</h3>
      <span id="resultCount"></span>
    </div>

    <div class="search">
      <span>⌕</span>
      <input id="searchInput" type="search" placeholder="搜索商品、分类或关键词" autocomplete="off">
    </div>

    <nav class="tabs" id="tabs" aria-label="商品分类"></nav>
    <section class="products" id="products"></section>
  </main>

  <div class="selected-bar" id="selectedBar">
    <div>
      <b id="selectedCount">已选 0 项</b>
      <span>打开清单后分享或咨询</span>
    </div>
    <button id="openSelectedBtn">查看选品</button>
  </div>

  <div class="overlay" id="detailOverlay" role="dialog" aria-modal="true">
    <section class="sheet detail">
      <div class="handle"></div>
      <div class="sheet-head">
        <h3>商品详情</h3>
        <button class="close-btn" data-close="detailOverlay">×</button>
      </div>
      <div class="detail-icon" id="detailIcon"></div>
      <h2 id="detailName"></h2>
      <div class="detail-price" id="detailPrice"></div>
      <div class="detail-desc" id="detailDesc"></div>
      <div class="detail-actions">
        <button class="action-btn" id="shareProductBtn">分享商品</button>
        <button class="action-btn" id="togglePickBtn">加入选品</button>
        <button class="action-btn primary full" id="consultProductBtn">咨询这个商品</button>
      </div>
    </section>
  </div>

  <div class="overlay" id="selectedOverlay" role="dialog" aria-modal="true">
    <section class="sheet">
      <div class="handle"></div>
      <div class="sheet-head">
        <h3>我的选品</h3>
        <button class="close-btn" data-close="selectedOverlay">×</button>
      </div>
      <div id="selectedItems"></div>
      <div class="consult-actions">
        <button class="action-btn" id="shareSelectedBtn">分享选品</button>
        <button class="action-btn primary" id="consultSelectedBtn">咨询客服</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* =========================================================
       最常修改的内容都集中在这里：店铺资料、客服和商品。
       ========================================================= */
    const STORE = {
      name: "ice_store",
      logo: "❄️",
      botUsername: "TJ_ice_CS_bot",
      heroTag: "全部商品均可咨询",
      heroTitle: "先浏览，再选择",
      heroText: "查看全部商品与服务，选中感兴趣的内容后，一键分享或联系客服咨询。"
    };

    const PRODUCTS = [
      {
        id: "premium-3",
        category: "Premium",
        icon: "💎",
        name: "Telegram Premium 3个月",
        price: "$13.99",
        badge: "热门",
        summary: "适合短期体验，可先查看详情再咨询。",
        description: "Telegram Premium 3个月方案。\n\n这里可以填写完整说明、适用条件、交付方式、注意事项和其他需要展示的信息。"
      },
      {
        id: "premium-6",
        category: "Premium",
        icon: "👑",
        name: "Telegram Premium 6个月",
        price: "$19.99",
        badge: "推荐",
        summary: "中长期使用方案，支持分享给好友查看。",
        description: "Telegram Premium 6个月方案。\n\n后续可以随时修改名称、价格、图片、介绍和分类。"
      },
      {
        id: "premium-12",
        category: "Premium",
        icon: "🏆",
        name: "Telegram Premium 12个月",
        price: "$35.99",
        badge: "长期",
        summary: "适合长期使用，详情以咨询确认为准。",
        description: "Telegram Premium 12个月方案。\n\n商品页用于展示与咨询，不在网页内直接完成付款。"
      },
      {
        id: "stars-100",
        category: "Stars",
        icon: "⭐",
        name: "Telegram Stars 100",
        price: "$1.99",
        badge: "入门",
        summary: "小额 Stars 商品展示模板。",
        description: "Telegram Stars 100。\n\n可以在这里补充实时价格、到账时间和使用说明。"
      },
      {
        id: "stars-500",
        category: "Stars",
        icon: "🌟",
        name: "Telegram Stars 500",
        price: "$8.99",
        badge: "常用",
        summary: "常用数量，可加入选品清单一起咨询。",
        description: "Telegram Stars 500。\n\n客户可以先加入选品，再统一分享或咨询。"
      },
      {
        id: "stars-1000",
        category: "Stars",
        icon: "✨",
        name: "Telegram Stars 1000",
        price: "$16.99",
        badge: "套餐",
        summary: "较大数量的展示示例。",
        description: "Telegram Stars 1000。\n\n正式使用时直接替换成你的真实商品内容即可。"
      },
      {
        id: "custom",
        category: "其他",
        icon: "🧩",
        name: "其他需求",
        price: "咨询报价",
        badge: "咨询",
        summary: "没有找到需要的内容，可以直接联系咨询。",
        description: "其他自定义需求。\n\n点击咨询按钮后，会复制商品信息并打开客服机器人。"
      }
    ];

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      try { tg.setHeaderColor("secondary_bg_color"); } catch (_) {}
    }

    const state = {
      category: "全部",
      search: "",
      currentProduct: null,
      selected: JSON.parse(localStorage.getItem("ice_store_selected") || "[]")
    };

    const $ = (id) => document.getElementById(id);
    const user = tg?.initDataUnsafe?.user;

    $("storeName").textContent = STORE.name;
    $("storeLogo").textContent = STORE.logo;
    $("heroTag").textContent = STORE.heroTag;
    $("heroTitle").textContent = STORE.heroTitle;
    $("heroText").textContent = STORE.heroText;
    $("hello").textContent = user ? `你好，${user.first_name || "Telegram 用户"}` : "欢迎浏览全部商品";

    function haptic(type = "light") {
      try { tg?.HapticFeedback?.impactOccurred(type); } catch (_) {}
    }

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function saveSelected() {
      localStorage.setItem("ice_store_selected", JSON.stringify(state.selected));
      renderSelectedBar();
    }

    function isSelected(id) {
      return state.selected.includes(id);
    }

    function toggleSelected(id) {
      if (isSelected(id)) {
        state.selected = state.selected.filter(item => item !== id);
        showToast("已从选品中移除");
      } else {
        state.selected.push(id);
        showToast("已加入选品");
      }
      haptic();
      saveSelected();
      renderProducts();
      updateDetailButton();
    }

    function renderTabs() {
      const categories = ["全部", ...new Set(PRODUCTS.map(p => p.category))];
      $("tabs").innerHTML = categories.map(category => `
        <button class="tab ${state.category === category ? "active" : ""}" data-category="${category}">${category}</button>
      `).join("");

      $("tabs").querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          haptic();
          renderTabs();
          renderProducts();
        });
      });
    }

    function filteredProducts() {
      const keyword = state.search.trim().toLowerCase();
      return PRODUCTS.filter(product => {
        const categoryMatch = state.category === "全部" || product.category === state.category;
        const text = `${product.name} ${product.category} ${product.summary} ${product.description}`.toLowerCase();
        return categoryMatch && (!keyword || text.includes(keyword));
      });
    }

    function renderProducts() {
      const list = filteredProducts();
      $("resultCount").textContent = `${list.length} 项`;

      if (!list.length) {
        $("products").innerHTML = '<div class="empty">没有找到相关内容</div>';
        return;
      }

      $("products").innerHTML = list.map(product => `
        <article class="product">
          <div class="product-icon">${product.icon}</div>
          <span class="badge">${product.badge}</span>
          <h4>${product.name}</h4>
          <p>${product.summary}</p>
          <div class="product-footer">
            <span class="price">${product.price}</span>
            <button class="view-btn" data-view="${product.id}">${isSelected(product.id) ? "已选 · 查看" : "查看详情"}</button>
          </div>
        </article>
      `).join("");

      $("products").querySelectorAll("[data-view]").forEach(button => {
        button.addEventListener("click", () => openDetail(button.dataset.view));
      });
    }

    function openDetail(id) {
      const product = PRODUCTS.find(item => item.id === id);
      if (!product) return;
      state.currentProduct = product;
      $("detailIcon").textContent = product.icon;
      $("detailName").textContent = product.name;
      $("detailPrice").textContent = product.price;
      $("detailDesc").textContent = product.description;
      updateDetailButton();
      $("detailOverlay").classList.add("show");
      haptic();
    }

    function updateDetailButton() {
      if (!state.currentProduct) return;
      $("togglePickBtn").textContent = isSelected(state.currentProduct.id) ? "移出选品" : "加入选品";
    }

    function closeOverlay(id) {
      $(id).classList.remove("show");
    }

    function renderSelectedBar() {
      const count = state.selected.length;
      $("selectedCount").textContent = `已选 ${count} 项`;
      $("selectedBar").classList.toggle("show", count > 0);
    }

    function selectedProducts() {
      return state.selected.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
    }

    function renderSelectedSheet() {
      const list = selectedProducts();
      $("selectedItems").innerHTML = list.length ? list.map(product => `
        <div class="pick-row">
          <div>
            <h4>${product.icon} ${product.name}</h4>
            <p>${product.price}</p>
          </div>
          <button class="remove-btn" data-remove="${product.id}">移除</button>
        </div>
      `).join("") : '<div class="empty">还没有选择商品</div>';

      $("selectedItems").querySelectorAll("[data-remove]").forEach(button => {
        button.addEventListener("click", () => {
          toggleSelected(button.dataset.remove);
          renderSelectedSheet();
        });
      });
    }

    function productText(product) {
      return `【${STORE.name} 商品咨询】\n商品：${product.name}\n价格：${product.price}\n分类：${product.category}\n页面：https://chili888.github.io/Web-app/`;
    }

    function selectedText() {
      const list = selectedProducts();
      const rows = list.map((p, index) => `${index + 1}. ${p.name}（${p.price}）`).join("\n");
      return `【${STORE.name} 选品咨询】\n${rows}\n\n我想了解以上商品，请联系我。`;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("内容已复制");
        return true;
      } catch (_) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
        showToast("内容已复制");
        return true;
      }
    }

    function openBot() {
      const url = `https://t.me/${STORE.botUsername}`;
      if (tg?.openTelegramLink) tg.openTelegramLink(url);
      else window.open(url, "_blank");
    }

    async function consult(text) {
      await copyText(text);
      setTimeout(openBot, 350);
    }

    function shareText(text) {
      const shareUrl = `https://t.me/share/url?url=${encodeURIComponent("https://chili888.github.io/Web-app/")}&text=${encodeURIComponent(text)}`;
      if (tg?.openTelegramLink) tg.openTelegramLink(shareUrl);
      else window.open(shareUrl, "_blank");
    }

    $("searchInput").addEventListener("input", event => {
      state.search = event.target.value;
      renderProducts();
    });

    $("topConsultBtn").addEventListener("click", () => consult(`你好，我正在浏览 ${STORE.name}，想咨询商品。`));
    $("togglePickBtn").addEventListener("click", () => state.currentProduct && toggleSelected(state.currentProduct.id));
    $("shareProductBtn").addEventListener("click", () => state.currentProduct && shareText(productText(state.currentProduct)));
    $("consultProductBtn").addEventListener("click", () => state.currentProduct && consult(productText(state.currentProduct)));

    $("openSelectedBtn").addEventListener("click", () => {
      renderSelectedSheet();
      $("selectedOverlay").classList.add("show");
    });
    $("shareSelectedBtn").addEventListener("click", () => shareText(selectedText()));
    $("consultSelectedBtn").addEventListener("click", () => consult(selectedText()));

    document.querySelectorAll("[data-close]").forEach(button => {
      button.addEventListener("click", () => closeOverlay(button.dataset.close));
    });

    document.querySelectorAll(".overlay").forEach(overlay => {
      overlay.addEventListener("click", event => {
        if (event.target === overlay) overlay.classList.remove("show");
      });
    });

    renderTabs();
    renderProducts();
    renderSelectedBar();
  </script>
</body>
</html>
