<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>国内精品肉铺</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./config.js"></script>
  <script defer src="./assets/app.js"></script>
</head>
<body>
  <header class="top">
    <div class="wrap topin">
      <div class="brand">
        <div class="logo">🥩</div>
        <div>
          <div id="shopName">国内精品肉铺</div>
          <div id="shopSubtitle" class="mini">商品浏览 · 选品咨询</div>
        </div>
      </div>
      <button class="topbtn" type="button" data-action="open-selected">
        选品 <span id="topCount">0</span>
      </button>
    </div>
  </header>

  <main class="wrap">
    <div id="modeNotice" class="mode-notice" hidden></div>

    <section class="hero">
      <div class="heroBox">
        <span id="heroTag" class="tag">国内精品 · 实时咨询</span>
        <h1 id="heroTitle">浏览全部商品，选好再咨询</h1>
        <p id="heroText">查看商品详情、价格、库存及配送说明。将感兴趣的商品加入选品清单后，可整体分享或一键联系官方客服。</p>
        <div class="quick">
          <button class="primary" type="button" data-action="scroll-products">浏览商品</button>
          <a id="channelLink" class="ghost" href="https://t.me/TJ_NO1_ice" target="_blank" rel="noopener">进入频道</a>
          <a id="groupLink" class="ghost" href="https://t.me/TJ_ice_Group" target="_blank" rel="noopener">进入群组</a>
        </div>
      </div>
    </section>

    <section id="products">
      <div class="tools">
        <input id="search" class="search" type="search" placeholder="搜索商品名称或分类" autocomplete="off" />
        <button class="selectedBtn" type="button" data-action="open-selected">选品清单</button>
      </div>
      <div id="cats" class="cats"></div>
      <div class="sectionTitle">
        <h2>全部商品</h2>
        <span id="resultCount" class="count"></span>
      </div>
      <div id="grid" class="grid">
        <div class="empty">商品加载中…</div>
      </div>
    </section>

    <section class="info">
      <div class="sectionTitle"><h2>购买说明</h2></div>
      <div class="infoGrid">
        <div class="infoItem"><b>价格说明</b><span id="priceNotice"></span></div>
        <div class="infoItem"><b>库存说明</b><span id="stockNotice"></span></div>
        <div class="infoItem"><b>配送售后</b><span id="deliveryNotice"></span></div>
        <div class="infoItem"><b>防骗提醒</b><span id="fraudNotice"></span></div>
      </div>
    </section>
  </main>

  <div class="bottom">
    <div class="bottomIn">
      <button class="shareAll" type="button" data-action="share-selected">分享选品</button>
      <button id="consultButton" class="consult" type="button" data-action="consult-selected">联系官方客服</button>
    </div>
  </div>

  <div id="detailShade" class="shade" data-close-sheet="detailShade">
    <div class="sheet">
      <div class="sheetTop">
        <h2 id="detailName"></h2>
        <button class="close" type="button" data-action="close-detail">×</button>
      </div>
      <div id="detailPic" class="sheetPic"></div>
      <div id="detailMeta" class="meta"></div>
      <div id="detailPrice" class="price"></div>
      <p id="detailDesc"></p>
      <div class="sheetBtns">
        <button class="shareAll" type="button" data-action="share-current">分享商品</button>
        <button class="consult" type="button" data-action="add-current">加入选品</button>
      </div>
    </div>
  </div>

  <div id="selectedShade" class="shade" data-close-sheet="selectedShade">
    <div class="sheet">
      <div class="sheetTop">
        <h2>选品清单</h2>
        <button class="close" type="button" data-action="close-selected">×</button>
      </div>
      <div id="selectedList" class="list"></div>
      <div class="sheetBtns">
        <button class="shareAll" type="button" data-action="share-selected">分享整份选品</button>
        <button class="consult" type="button" data-action="consult-selected">复制并咨询</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
</body>
</html>
