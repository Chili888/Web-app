<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
  >

  <title>ice_store</title>

  <!-- Telegram Mini App 官方脚本 -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #111111);
    }

    .card {
      padding: 22px;
      border-radius: 18px;
      background: var(--tg-theme-secondary-bg-color, #f2f2f2);
    }

    h1 {
      margin-top: 0;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 15px;
      margin-top: 16px;
      font-size: 16px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>欢迎来到 ice_store</h1>
    <p>全天 24 小时开放，随时接受您的订单。</p>
    <p id="user">正在读取 Telegram 用户信息……</p>

    <button onclick="submitOrder()">开始下单</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;

    tg.ready();
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    if (user) {
      document.getElementById("user").textContent =
        `您好，${user.first_name || "Telegram 用户"}`;
    } else {
      document.getElementById("user").textContent =
        "请在 Telegram 内打开此小程序";
    }

    function submitOrder() {
      tg.showAlert("下单功能正在建设中");
    }
  </script>
</body>
</html>
